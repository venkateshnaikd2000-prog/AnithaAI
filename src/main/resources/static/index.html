<!DOCTYPE html>
<html>
<head>
<title>Anitha AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial;}
.main{display:flex;height:100vh;}
.sidebar{width:290px;background:#020617;padding:18px;overflow-y:auto;}
.sidebar h2{color:#38bdf8;}
.newChat{width:100%;padding:14px;border:none;border-radius:10px;background:#38bdf8;cursor:pointer;font-size:16px;}
.chatItem{padding:12px;margin-top:10px;background:#1e293b;border-radius:10px;cursor:pointer;}
.deleteBtn{float:right;background:#ef4444;color:white;border:none;border-radius:6px;cursor:pointer;}
.content{flex:1;display:flex;flex-direction:column;}
.header{padding:15px;text-align:center;border-bottom:1px solid #1e293b;}
.chatBox{flex:1;overflow-y:auto;padding:25px;}
.message{max-width:75%;padding:16px;margin:14px;border-radius:14px;line-height:1.7;white-space:pre-wrap;}
.user{background:#2563eb;margin-left:auto;}
.anitha{background:#1e293b;color:#7dd3fc;}
.inputArea{display:flex;align-items:center;padding:18px;border-top:1px solid #1e293b;position:relative;}
input{flex:1;padding:16px;border:none;border-radius:12px;font-size:17px;}
.iconBtn{margin-right:10px;padding:15px 18px;border:none;border-radius:12px;background:#38bdf8;cursor:pointer;font-size:18px;}
.sendBtn{margin-left:10px;padding:15px 18px;border:none;border-radius:12px;background:#38bdf8;cursor:pointer;font-size:18px;}
.plusMenu{display:none;position:absolute;bottom:75px;left:18px;background:#020617;border:1px solid #334155;border-radius:14px;padding:12px;width:260px;box-shadow:0 0 20px #000;}
.menuBtn{width:100%;padding:12px;margin:5px 0;border:none;border-radius:10px;background:#1e293b;color:white;text-align:left;cursor:pointer;font-size:15px;}
.menuBtn:hover{background:#334155;}
.on{background:#22c55e!important;color:#020617!important;}
.brainOn{background:#38bdf8!important;color:#020617!important;}
#imageInput,#pdfInput{display:none;}
</style>
</head>

<body>
<div class="main">

<div class="sidebar">
<h2><i class="fa-solid fa-brain"></i> Anitha AI</h2>
<button class="newChat" onclick="createNewChat()"><i class="fa-solid fa-pen-to-square"></i> New Chat</button>
<div id="chatList"></div>
</div>

<div class="content">
<div class="header">
<h1>Anitha AI</h1>
<p id="statusText">Local Brain · Normal Mode</p>
</div>

<div class="chatBox" id="chatBox"></div>

<div class="inputArea">

<button class="iconBtn" onclick="toggleMenu()">+</button>

<div class="plusMenu" id="plusMenu">
<button id="localBtn" class="menuBtn brainOn" onclick="selectBrain('local')"><i class="fa-solid fa-laptop"></i> Local Brain</button>
<button id="geminiBtn" class="menuBtn" onclick="selectBrain('gemini')"><i class="fa-solid fa-cloud"></i> Gemini Cloud</button>

<button id="internetBtn" class="menuBtn" onclick="toggleInternet()"><i class="fa-solid fa-globe"></i> Internet OFF</button>
<button id="autonomousBtn" class="menuBtn" onclick="toggleAutonomous()"><i class="fa-solid fa-robot"></i> Autonomous OFF</button>
<button id="imageModeBtn" class="menuBtn" onclick="toggleImageMode()"><i class="fa-solid fa-eye"></i> Image Mode OFF</button>
<button id="pdfModeBtn" class="menuBtn" onclick="togglePdfMode()"><i class="fa-solid fa-file-pdf"></i> PDF Mode OFF</button>

<button class="menuBtn" onclick="document.getElementById('imageInput').click()"><i class="fa-solid fa-image"></i> Upload Image</button>
<button class="menuBtn" onclick="document.getElementById('pdfInput').click()"><i class="fa-solid fa-file-pdf"></i> Upload PDF</button>
<button class="menuBtn" onclick="startVoice()"><i class="fa-solid fa-microphone"></i> Voice Input</button>
</div>

<input id="question" placeholder="Message Anitha AI..." onkeydown="handleEnter(event)">
<input type="file" id="imageInput" accept="image/*" onchange="uploadImage()">
<input type="file" id="pdfInput" accept="application/pdf" onchange="uploadPdf()">

<button class="sendBtn" onclick="askAnitha()"><i class="fa-solid fa-paper-plane"></i></button>
</div>

</div>
</div>

<script>
let brain="local";
let currentModel="auto";
let internetMode=false;
let autonomousMode=false;
let imageMode=false;
let pdfMode=false;
let currentChatId=null;

window.onload=async function(){
    await loadChats();
    await createNewChat();
};

function toggleMenu(){
    let menu=document.getElementById("plusMenu");
    menu.style.display=menu.style.display==="block"?"none":"block";
}

function updateStatus(){
    document.getElementById("statusText").innerText =
        (brain==="local"?"Local Brain":"Gemini Cloud") +
        (internetMode?" · Internet ON":"") +
        (autonomousMode?" · Autonomous ON":"") +
        (imageMode?" · Image Mode":"") +
        (pdfMode?" · PDF Mode":"");
}

function selectBrain(value){
    brain=value;
    document.getElementById("localBtn").classList.remove("brainOn");
    document.getElementById("geminiBtn").classList.remove("brainOn");
    document.getElementById(value==="local"?"localBtn":"geminiBtn").classList.add("brainOn");
    updateStatus();
}

function toggleInternet(){internetMode=!internetMode;toggleBtn("internetBtn","Internet",internetMode,"fa-globe");}
function toggleAutonomous(){autonomousMode=!autonomousMode;toggleBtn("autonomousBtn","Autonomous",autonomousMode,"fa-robot");}
function toggleImageMode(){imageMode=!imageMode;toggleBtn("imageModeBtn","Image Mode",imageMode,"fa-eye");}
function togglePdfMode(){pdfMode=!pdfMode;toggleBtn("pdfModeBtn","PDF Mode",pdfMode,"fa-file-pdf");}

function toggleBtn(id,label,on,icon){
    let btn=document.getElementById(id);
    btn.innerHTML=`<i class="fa-solid ${icon}"></i> ${label} ${on?"ON":"OFF"}`;
    on?btn.classList.add("on"):btn.classList.remove("on");
    updateStatus();
}

function handleEnter(event){if(event.key==="Enter") askAnitha();}

async function createNewChat(){
    let response=await fetch("http://localhost:8080/chat/new?title=New Chat",{method:"POST"});
    let chat=await response.json();
    currentChatId=chat.id;
    document.getElementById("chatBox").innerHTML="";
    await loadChats();
}

async function loadChats(){
    let response=await fetch("http://localhost:8080/chat/all");
    let chats=await response.json();
    let chatList=document.getElementById("chatList");
    chatList.innerHTML="";
    chats.forEach(chat=>{
        chatList.innerHTML+=`
        <div class="chatItem" onclick="openChat('${chat.id}')">
            <span>${chat.title}</span>
            <button class="deleteBtn" onclick="deleteChat(event,'${chat.id}')">
            <i class="fa-solid fa-trash"></i>
            </button>
        </div>`;
    });
}

async function openChat(id){
    currentChatId=id;
    let response=await fetch("http://localhost:8080/chat/"+id);
    let chat=await response.json();
    let chatBox=document.getElementById("chatBox");
    chatBox.innerHTML="";
    chat.messages.forEach(msg=>{
        if(msg.startsWith("User:")){
            chatBox.innerHTML+=`<div class="message user"><b>You:</b><br>${msg.replace("User:","")}</div>`;
        }else{
            chatBox.innerHTML+=`<div class="message anitha"><b>Anitha AI:</b><br>${msg.replace("Anitha AI:","")}</div>`;
        }
    });
    chatBox.scrollTop=chatBox.scrollHeight;
}

async function deleteChat(event,id){
    event.stopPropagation();
    await fetch("http://localhost:8080/chat/"+id,{method:"DELETE"});
    if(currentChatId===id){
        currentChatId=null;
        document.getElementById("chatBox").innerHTML="";
    }
    await loadChats();
}

async function askAnitha(){
    let input=document.getElementById("question");
    let q=input.value.trim();
    if(q==="") return;

    if(currentChatId===null) await createNewChat();

    input.value="";
    document.getElementById("plusMenu").style.display="none";

    let chatBox=document.getElementById("chatBox");
    chatBox.innerHTML+=`<div class="message user"><b>You:</b><br>${q}</div>`;

    let thinkingId="thinking-"+Date.now();
    chatBox.innerHTML+=`<div class="message anitha" id="${thinkingId}"><b>Anitha AI:</b><br>Thinking...</div>`;
    chatBox.scrollTop=chatBox.scrollHeight;

    try{
        let response=await fetch(
            "http://localhost:8080/ask?question="+encodeURIComponent(q)+
            "&brain="+encodeURIComponent(brain)+
            "&model="+encodeURIComponent(currentModel)+
            "&internet="+internetMode+
            "&autonomous="+autonomousMode+
            "&image="+imageMode+
            "&pdf="+pdfMode+
            "&chatId="+encodeURIComponent(currentChatId)
        );

        let answer=await response.text();
        document.getElementById(thinkingId).innerHTML="<b>Anitha AI:</b><br>"+answer;
        speak(answer);
        await loadChats();
    }catch(error){
        document.getElementById(thinkingId).innerHTML="<b>Anitha AI:</b><br>Connection failed.";
    }

    chatBox.scrollTop=chatBox.scrollHeight;
}

async function uploadImage(){
    let file=document.getElementById("imageInput").files[0];
    if(!file) return;

    addUploadMessage(file.name,"Uploading image...");
    let formData=new FormData();
    formData.append("image",file);

    let response=await fetch("http://localhost:8080/upload-image",{method:"POST",body:formData});
    let result=await response.text();

    imageMode=true;
    toggleBtn("imageModeBtn","Image Mode",true,"fa-eye");
    addAnithaMessage(result+" Now ask me about this image.");
}

async function uploadPdf(){
    let file=document.getElementById("pdfInput").files[0];
    if(!file) return;

    addUploadMessage(file.name,"Uploading PDF...");
    let formData=new FormData();
    formData.append("pdf",file);

    let response=await fetch("http://localhost:8080/upload-pdf",{method:"POST",body:formData});
    let result=await response.text();

    pdfMode=true;
    toggleBtn("pdfModeBtn","PDF Mode",true,"fa-file-pdf");
    addAnithaMessage(result+" Now ask me about this PDF.");
}

function addUploadMessage(fileName,status){
    let chatBox=document.getElementById("chatBox");
    chatBox.innerHTML+=`<div class="message user"><b>Uploaded:</b><br>${fileName}</div>`;
    chatBox.innerHTML+=`<div class="message anitha"><b>Anitha AI:</b><br>${status}</div>`;
    chatBox.scrollTop=chatBox.scrollHeight;
}

function addAnithaMessage(text){
    let chatBox=document.getElementById("chatBox");
    chatBox.innerHTML+=`<div class="message anitha"><b>Anitha AI:</b><br>${text}</div>`;
    chatBox.scrollTop=chatBox.scrollHeight;
}

function speak(text){
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();

    let clean=text.replace(/<[^>]*>/g,"");
    let utterance=new SpeechSynthesisUtterance(clean);
    utterance.lang="en-IN";
    utterance.rate=1;
    utterance.pitch=1.25;

    let voices=speechSynthesis.getVoices();
    for(let v of voices){
        if(v.name.includes("Zira") || v.name.toLowerCase().includes("female")){
            utterance.voice=v;
            break;
        }
    }

    speechSynthesis.speak(utterance);
}

function startVoice(){
    let SpeechRecognition=window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Voice input is not supported in this browser. Use Chrome.");
        return;
    }

    let recognition=new SpeechRecognition();
    recognition.lang="en-IN";
    recognition.interimResults=false;
    recognition.maxAlternatives=1;
    recognition.start();

    recognition.onresult=function(event){
        document.getElementById("question").value=event.results[0][0].transcript;
        askAnitha();
    };
}
</script>
</body>
</html>
